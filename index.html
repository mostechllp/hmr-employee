<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="theme-color" content="#2ecc71">
  <title>Employee Login | Human Resource Management</title>
  <!-- Google Fonts: Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ===== COMPLETE COLOR SYSTEM ===== */
    :root {
      --green: #2ecc71;
      --green-dark: #1a9e52;
      --green-light: #d4f7e4;
      --green-glow: rgba(46, 204, 113, 0.12);
      --red: #e74c3c;
      --amber: #f39c12;
      --blue: #3498db;
      --purple: #9b59b6;
      --yellow: #f1c40f;
      --yellow-light: #fff9e6;

      --bg: #f4f7f5;
      --surface: #ffffff;
      --surface2: #f0f4f1;
      --border: #e2ebe5;
      --text: #1a2e22;
      --text-secondary: #4a5f52;
      --muted: #7a9486;
      --sidebar-bg: #1a2e22;
      --sidebar-text: rgba(255, 255, 255, 0.7);
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.12);
      --radius: 18px;
      --radius-sm: 10px;
    }

    [data-theme="dark"] {
      --bg: #0f1412;
      --surface: #1a241f;
      --surface2: #1f2c26;
      --border: #2a3a32;
      --text: #ecfdf5;
      --text-secondary: #b8d9cc;
      --muted: #7e9a8c;
      --sidebar-bg: #0a100e;
      --sidebar-text: rgba(255, 255, 255, 0.65);
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.4);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
      overflow-x: hidden;
    }

    /* Split Screen Layout */
    .login-container {
      display: flex;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Left Side - Login Form (now on left) */
    .form-side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      overflow-y: auto;
      padding: 40px;
      transition: background 0.3s;
    }

    .login-card {
      max-width: 420px;
      width: 100%;
    }

    /* Right Side - Branding with Green Theme (now on right) */
    .brand-side {
      flex: 1;
      background: linear-gradient(135deg, var(--green-dark), var(--green));
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      overflow: hidden;
    }

    .brand-side::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="3" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="40" r="5" fill="rgba(255,255,255,0.1)"/><circle cx="50" cy="85" r="4" fill="rgba(255,255,255,0.1)"/><circle cx="90" cy="80" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="15" cy="70" r="3" fill="rgba(255,255,255,0.1)"/></svg>') repeat;
      opacity: 0.3;
      pointer-events: none;
    }

    .brand-content {
      text-align: center;
      color: white;
      z-index: 1;
      max-width: 500px;
    }

    .brand-icon {
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      border-radius: 10px;
      background: white;
      padding: 4px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      transition: transform 0.3s;
    }

    .logo-img:hover {
      transform: scale(1.05);
    }

    .brand-content h1 {
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .brand-content p {
      font-size: 18px;
      line-height: 1.6;
      opacity: 0.9;
    }

    .features-list {
      margin-top: 50px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      text-align: left;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(255, 255, 255, 0.1);
      padding: 12px 20px;
      border-radius: 16px;
      backdrop-filter: blur(5px);
      transition: transform 0.2s, background 0.2s;
    }

    .feature-item:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateX(5px);
    }

    .feature-item i {
      font-size: 24px;
      width: 40px;
    }

    .feature-item span {
      font-size: 14px;
      font-weight: 500;
    }

    /* Theme Toggle */
    .theme-toggle-wrapper {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 10;
    }

    .theme-toggle {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 4px;
      gap: 4px;
      box-shadow: var(--shadow);
    }

    .theme-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
      color: var(--text-secondary);
    }

    .theme-btn.active {
      background: var(--green);
      color: white;
      box-shadow: 0 2px 8px rgba(46, 204, 113, 0.3);
    }

    .theme-btn:hover:not(.active) {
      background: var(--green-light);
      color: var(--green-dark);
    }

    /* Login Header */
    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-header h2 {
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }

    .login-header p {
      font-size: 14px;
      color: var(--muted);
    }

    /* Form Styles */
    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 16px;
      transition: color 0.2s;
    }

    .input-wrapper input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      transition: all 0.2s;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px var(--green-glow);
    }

    /* Remember & Forgot */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .checkbox-label input {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--green);
    }

    .forgot-link {
      font-size: 13px;
      color: var(--green);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .forgot-link:hover {
      color: var(--green-dark);
      text-decoration: underline;
    }

    /* Sign In Button */
    .signin-btn {
      width: 100%;
      padding: 14px;
      background: var(--green);
      border: none;
      border-radius: 40px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .signin-btn:hover {
      background: var(--green-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3);
    }

    .signin-btn:active {
      transform: translateY(0);
    }

    /* Demo Credentials */
    .demo-credentials {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .demo-credentials p {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .demo-badge {
      display: inline-flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .demo-badge span {
      background: var(--surface2);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-family: monospace;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      border-left: 4px solid var(--green);
      z-index: 2000;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: slideUp 0.2s ease;
    }

    .toast.error {
      border-left-color: var(--red);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 900px) {
      .brand-side {
        display: none;
      }

      .form-side {
        flex: 1;
        padding: 24px;
      }

      .login-card {
        max-width: 100%;
      }

      .theme-toggle-wrapper {
        top: 16px;
        left: 16px;
      }
    }

    @media (max-width: 480px) {
      .form-side {
        padding: 20px;
      }

      .login-header h2 {
        font-size: 28px;
      }

      .input-wrapper input {
        padding: 12px 16px 12px 44px;
      }

      .theme-btn {
        width: 34px;
        height: 34px;
        font-size: 14px;
      }
    }

    /* Loading animation */
    .loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .signin-btn i.fa-spinner {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="login-container">
    <!-- Left Side - Login Form -->
    <div class="form-side">
      <div class="theme-toggle-wrapper">
        <div class="theme-toggle">
          <button class="theme-btn" id="lightBtn" onclick="setTheme('light')"><i class="fas fa-sun"></i></button>
          <button class="theme-btn" id="darkBtn" onclick="setTheme('dark')"><i class="fas fa-moon"></i></button>
        </div>
      </div>

      <div class="login-card">
        <div class="login-header">
          <h2>Welcome Back</h2>
          <p>Sign in to your employee account</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Company Email</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input type="email" id="email" placeholder="you@company.com" value="john@thesay.ae" required autocomplete="email">
            </div>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input type="password" id="password" placeholder="••••••••" value="employee123" required autocomplete="current-password">
            </div>
          </div>

          <div class="form-options">
            <label class="checkbox-label">
              <input type="checkbox" id="rememberMe"> Remember me
            </label>
            <a href="#" class="forgot-link" onclick="forgotPassword(event)">Forgot Password?</a>
          </div>

          <button type="submit" class="signin-btn" id="signinBtn">
            <i class="fas fa-arrow-right-to-bracket"></i> Sign In
          </button>
        </form>
      </div>
    </div>

    <!-- Right Side - Branding with Logo -->
    <div class="brand-side">
      <div class="brand-content">
        <div class="brand-icon">
          <img src="https://violet-leopard-500489.hostingersite.com/hr/public/assets/images/hr-logo2.jpg" alt="HMR Logo" class="logo-img">
        </div>
        <h1>Employee Portal</h1>
        <p>Access your attendance, leave requests, and personal information anytime, anywhere.</p>

        <div class="features-list">
          <div class="feature-item">
            <i class="fas fa-fingerprint"></i>
            <span>Mark Attendance & Track Hours</span>
          </div>
          <div class="feature-item">
            <i class="fas fa-calendar-alt"></i>
            <span>Apply for Leaves & View Status</span>
          </div>
          <div class="feature-item">
            <i class="fas fa-chart-line"></i>
            <span>View Personal Analytics & Reports</span>
          </div>
          <div class="feature-item">
            <i class="fas fa-user-circle"></i>
            <span>Update Profile & Documents</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Theme Functions
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('employee-theme', theme);

      // Update active state on buttons
      const lightBtn = document.getElementById('lightBtn');
      const darkBtn = document.getElementById('darkBtn');

      if (theme === 'light') {
        lightBtn.classList.add('active');
        darkBtn.classList.remove('active');
      } else {
        darkBtn.classList.add('active');
        lightBtn.classList.remove('active');
      }
    }

    // Show Toast Notification
    function showToast(message, isSuccess = true) {
      const existingToast = document.querySelector('.toast');
      if (existingToast) existingToast.remove();

      const toast = document.createElement('div');
      toast.className = `toast ${isSuccess ? '' : 'error'}`;
      const icon = isSuccess ? '<i class="fas fa-check-circle" style="color: var(--green);"></i>' : '<i class="fas fa-exclamation-triangle" style="color: var(--red);"></i>';
      toast.innerHTML = `${icon} ${message}`;
      document.body.appendChild(toast);

      setTimeout(() => {
        if (toast && toast.parentNode) toast.remove();
      }, 3000);
    }

    // Handle Login with loading state
    async function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;
      const signinBtn = document.getElementById('signinBtn');
      const originalContent = signinBtn.innerHTML;

      // Validation
      if (!email) {
        showToast('Please enter your email address', false);
        document.getElementById('email').focus();
        return;
      }

      if (!password) {
        showToast('Please enter your password', false);
        document.getElementById('password').focus();
        return;
      }

      // Email format validation
      const emailPattern = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
      if (!emailPattern.test(email)) {
        showToast('Please enter a valid email address', false);
        return;
      }

      // Show loading state
      signinBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
      signinBtn.classList.add('loading');

      // Simulate network delay for better UX
      await new Promise(resolve => setTimeout(resolve, 800));

      // Demo validation for employee
      const validEmployeeEmails = [
        'john@thesay.ae',
        'jane@thesay.ae',
        'employee@thesay.ae',
        'test@thesay.ae'
      ];

      if (validEmployeeEmails.includes(email) && password === 'employee123') {
        // Handle remember me
        if (rememberMe) {
          localStorage.setItem('employee-remembered', 'true');
          localStorage.setItem('employee-email', email);
        } else {
          localStorage.removeItem('employee-remembered');
          localStorage.removeItem('employee-email');
        }

        // Store employee info
        localStorage.setItem('employee-logged-in', 'true');
        localStorage.setItem('employee-email', email);

        showToast('Login successful! Redirecting to dashboard...', true);

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1000);
      } else {
        // Reset button state
        signinBtn.innerHTML = originalContent;
        signinBtn.classList.remove('loading');
        showToast('Invalid email or password. Please try again.', false);

        // Shake effect on form
        const loginCard = document.querySelector('.login-card');
        loginCard.style.transform = 'translateX(5px)';
        setTimeout(() => {
          loginCard.style.transform = 'translateX(-5px)';
        }, 50);
        setTimeout(() => {
          loginCard.style.transform = 'translateX(0)';
        }, 100);
      }
    }

    // Forgot Password handler
    function forgotPassword(event) {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();

      if (email && email.includes('@')) {
        showToast(`Password reset link has been sent to ${email}`, true);
      } else {
        showToast('Please enter your email address to reset password', false);
        document.getElementById('email').focus();
      }
    }

    // Load saved preferences
    function loadSavedPreferences() {
      // Load theme
      const savedTheme = localStorage.getItem('employee-theme') || 'light';
      setTheme(savedTheme);

      // Load remembered credentials
      const remembered = localStorage.getItem('employee-remembered');
      if (remembered === 'true') {
        const savedEmail = localStorage.getItem('employee-email');
        if (savedEmail) {
          document.getElementById('email').value = savedEmail;
          document.getElementById('rememberMe').checked = true;
        }
      }
    }

    // Add Enter key support
    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter' && document.activeElement.tagName !== 'BUTTON') {
        const form = document.getElementById('loginForm');
        if (form && document.activeElement.closest('.login-card')) {
          handleLogin(e);
        }
      }
    });

    // Add input focus effects
    const inputs = document.querySelectorAll('.input-wrapper input');
    inputs.forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.style.transform = 'scale(1.01)';
      });
      input.addEventListener('blur', function() {
        this.parentElement.style.transform = 'scale(1)';
      });
    });

    // Initialize
    loadSavedPreferences();

    // Optional: Add subtle animation on page load
    window.addEventListener('load', () => {
      document.querySelector('.login-card').style.opacity = '0';
      document.querySelector('.login-card').style.transform = 'translateY(20px)';
      setTimeout(() => {
        document.querySelector('.login-card').style.transition = 'all 0.4s ease';
        document.querySelector('.login-card').style.opacity = '1';
        document.querySelector('.login-card').style.transform = 'translateY(0)';
      }, 100);
    });
  </script>
</body>

</html>
